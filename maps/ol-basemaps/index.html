<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Basemap Explorer · Map Collection</title>
  <link rel="stylesheet" href="../../assets/gallery.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.3.1/ol.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; }

    #map { width: 100%; height: 100%; }

    /* ── Panel ── */
    #panel {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 100;
      width: 220px;
      background: rgba(255,255,255,0.97);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      overflow: hidden;
    }

    #panel-header {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 0.9rem;
      background: #1a1a1a;
      color: #fff;
    }
    #panel-header a {
      display: flex; align-items: center; justify-content: center;
      width: 24px; height: 24px; border-radius: 6px;
      background: rgba(255,255,255,0.15);
      color: #fff; text-decoration: none; font-size: 0.8rem;
      flex-shrink: 0; transition: background 0.15s;
    }
    #panel-header a:hover { background: rgba(255,255,255,0.25); }
    #panel-header .title { font-size: 0.85rem; font-weight: 700; flex: 1; }

    #minimize-btn {
      background: rgba(255,255,255,0.15); border: none;
      border-radius: 50%; width: 22px; height: 22px;
      color: #fff; cursor: pointer; font-size: 0.7rem;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s; flex-shrink: 0;
    }
    #minimize-btn:hover { background: rgba(255,255,255,0.3); }

    #panel.minimized #panel-body { display: none; }

    #panel-body { padding: 0.6rem; display: flex; flex-direction: column; gap: 0.3rem; max-height: calc(100vh - 6rem); overflow-y: auto; }

    /* ── Category ── */
    .cat-label {
      font-size: 0.62rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.07em; color: #9ca3af;
      padding: 0.4rem 0.3rem 0.1rem;
    }

    /* ── Basemap button ── */
    .bm-btn {
      display: flex; align-items: center; gap: 0.5rem;
      width: 100%; padding: 0.45rem 0.5rem;
      border: 1.5px solid transparent; border-radius: 10px;
      background: none; cursor: pointer; text-align: left;
      transition: all 0.15s;
    }
    .bm-btn:hover { background: #f3f4f6; }
    .bm-btn.active { background: #f0f9ff; border-color: #0ea5e9; }

    .bm-thumb {
      width: 36px; height: 36px; border-radius: 6px;
      background: #e5e7eb; flex-shrink: 0; overflow: hidden;
      border: 1px solid #e5e7eb;
    }
    .bm-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .bm-info { flex: 1; min-width: 0; }
    .bm-name { font-size: 0.78rem; font-weight: 600; color: #1a1a1a; line-height: 1.2; }
    .bm-provider { font-size: 0.62rem; color: #9ca3af; }

    .bm-check {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid #d1d5db; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .bm-btn.active .bm-check { background: #0ea5e9; border-color: #0ea5e9; }
    .bm-btn.active .bm-check::after { content: ''; display: block; width: 5px; height: 5px; border-radius: 50%; background: #fff; }

    /* ── Info bar ── */
    #info-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 50;
      background: rgba(0,0,0,0.7);
      color: rgba(255,255,255,0.7);
      font-size: 0.65rem;
      padding: 4px 12px;
      display: flex; align-items: center; gap: 1rem;
      backdrop-filter: blur(4px);
    }
    #active-name { font-weight: 700; color: #fff; }

    /* OL overrides */
    .ol-zoom { bottom: 2rem !important; top: auto !important; right: 1rem !important; left: auto !important; }
    .ol-attribution { bottom: 1.5rem !important; }
    .ol-attribution ul { font-size: 0.6rem; }
    .ol-rotate { display: none; }
  </style>
</head>
<body>

<div id="map"></div>

<div id="panel">
  <div id="panel-header">
    <a href="../index.html" title="Back to gallery">←</a>
    <span class="title">🗺️ Basemap Explorer</span>
    <button id="minimize-btn" title="Minimize">–</button>
  </div>
  <div id="panel-body" id="basemap-list">
    <!-- Injected by JS -->
  </div>
</div>

<div id="info-bar">
  <span>Active: <span id="active-name">—</span></span>
  <span id="active-attribution" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
</div>

<script src="https://cdn.jsdelivr.net/npm/ol@10.3.1/dist/ol.js"></script>
<script>
const BASEMAPS = [
  {
    category: 'Street',
    maps: [
      {
        id: 'osm',
        name: 'OpenStreetMap',
        provider: 'OSM',
        url: 'https://{a-c}.tile.openstreetmap.org/{z}/{x}/{y}.png',
        attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors',
        thumb: 'https://tile.openstreetmap.org/5/16/10.png',
      },
      {
        id: 'carto-light',
        name: 'Positron',
        provider: 'CartoDB',
        url: 'https://{a-d}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',
        attribution: '© <a href="https://carto.com">CARTO</a> | © OSM',
        thumb: 'https://a.basemaps.cartocdn.com/light_all/5/16/10.png',
      },
      {
        id: 'carto-dark',
        name: 'Dark Matter',
        provider: 'CartoDB',
        url: 'https://{a-d}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png',
        attribution: '© <a href="https://carto.com">CARTO</a> | © OSM',
        thumb: 'https://a.basemaps.cartocdn.com/dark_all/5/16/10.png',
      },
      {
        id: 'carto-voyager',
        name: 'Voyager',
        provider: 'CartoDB',
        url: 'https://{a-d}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png',
        attribution: '© <a href="https://carto.com">CARTO</a> | © OSM',
        thumb: 'https://a.basemaps.cartocdn.com/rastertiles/voyager/5/16/10.png',
      },
    ]
  },
  {
    category: 'Terrain & Outdoors',
    maps: [
      {
        id: 'otm',
        name: 'OpenTopoMap',
        provider: 'OpenTopoMap',
        url: 'https://{a-c}.tile.opentopomap.org/{z}/{x}/{y}.png',
        attribution: '© <a href="https://opentopomap.org">OpenTopoMap</a> | © OSM',
        thumb: 'https://a.tile.opentopomap.org/5/16/10.png',
      },
      {
        id: 'stadia-outdoors',
        name: 'Outdoors',
        provider: 'Stadia',
        url: 'https://tiles.stadiamaps.com/tiles/outdoors/{z}/{x}/{y}.png',
        attribution: '© <a href="https://stadiamaps.com">Stadia Maps</a> | © OSM',
        thumb: 'https://tiles.stadiamaps.com/tiles/outdoors/5/16/10.png',
      },
    ]
  },
  {
    category: 'Artistic',
    maps: [
      {
        id: 'stadia-watercolor',
        name: 'Watercolor',
        provider: 'Stadia / Stamen',
        url: 'https://tiles.stadiamaps.com/tiles/stamen_watercolor/{z}/{x}/{y}.jpg',
        attribution: '© <a href="https://stadiamaps.com">Stadia</a> | © <a href="https://stamen.com">Stamen</a>',
        thumb: 'https://tiles.stadiamaps.com/tiles/stamen_watercolor/5/16/10.jpg',
      },
      {
        id: 'stadia-toner',
        name: 'Toner',
        provider: 'Stadia / Stamen',
        url: 'https://tiles.stadiamaps.com/tiles/stamen_toner/{z}/{x}/{y}.png',
        attribution: '© <a href="https://stadiamaps.com">Stadia</a> | © <a href="https://stamen.com">Stamen</a>',
        thumb: 'https://tiles.stadiamaps.com/tiles/stamen_toner/5/16/10.png',
      },
      {
        id: 'stadia-toner-lite',
        name: 'Toner Lite',
        provider: 'Stadia / Stamen',
        url: 'https://tiles.stadiamaps.com/tiles/stamen_toner_lite/{z}/{x}/{y}.png',
        attribution: '© <a href="https://stadiamaps.com">Stadia</a> | © <a href="https://stamen.com">Stamen</a>',
        thumb: 'https://tiles.stadiamaps.com/tiles/stamen_toner_lite/5/16/10.png',
      },
    ]
  },
  {
    category: 'Satellite & Imagery',
    maps: [
      {
        id: 'esri-satellite',
        name: 'World Imagery',
        provider: 'ESRI',
        url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
        attribution: '© <a href="https://esri.com">Esri</a> | © Various',
        thumb: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/5/10/16',
      },
      {
        id: 'esri-streets',
        name: 'World Street',
        provider: 'ESRI',
        url: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}',
        attribution: '© <a href="https://esri.com">Esri</a>',
        thumb: 'https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/5/10/16',
      },
      {
        id: 'esri-natgeo',
        name: 'National Geographic',
        provider: 'ESRI',
        url: 'https://server.arcgisonline.com/ArcGIS/rest/services/NatGeo_World_Map/MapServer/tile/{z}/{y}/{x}',
        attribution: '© <a href="https://esri.com">Esri</a> | National Geographic',
        thumb: 'https://server.arcgisonline.com/ArcGIS/rest/services/NatGeo_World_Map/MapServer/tile/5/10/16',
      },
    ]
  },
  {
    category: 'OpenFreeMap (Vector)',
    maps: [
      {
        id: 'ofm-bright',
        name: 'Bright',
        provider: 'OpenFreeMap',
        url: 'https://tiles.openfreemap.org/styles/bright',
        isVector: true,
        attribution: '© <a href="https://openfreemap.org">OpenFreeMap</a> | © OSM',
        thumb: 'https://tiles.openfreemap.org/styles/bright/thumbnail.png',
      },
      {
        id: 'ofm-liberty',
        name: 'Liberty',
        provider: 'OpenFreeMap',
        url: 'https://tiles.openfreemap.org/styles/liberty',
        isVector: true,
        attribution: '© <a href="https://openfreemap.org">OpenFreeMap</a> | © OSM',
        thumb: 'https://tiles.openfreemap.org/styles/liberty/thumbnail.png',
      },
    ]
  },
]

// ── Build OL map ──
const view = new ol.View({ center: ol.proj.fromLonLat([0, 20]), zoom: 2 })
const map = new ol.Map({ target: 'map', view, controls: ol.control.defaults.defaults() })

// ── Layer registry ──
const layers = {}
let activeId = null

function getOrCreateLayer(bm) {
  if (layers[bm.id]) return layers[bm.id]
  const src = new ol.source.XYZ({ url: bm.url, crossOrigin: 'anonymous' })
  const layer = new ol.layer.Tile({ source: src, visible: false })
  map.addLayer(layer)
  layers[bm.id] = layer
  return layer
}

function switchBasemap(bm) {
  Object.values(layers).forEach(l => l.setVisible(false))
  const layer = getOrCreateLayer(bm)
  layer.setVisible(true)
  activeId = bm.id

  // Update UI
  document.querySelectorAll('.bm-btn').forEach(b => b.classList.remove('active'))
  const btn = document.querySelector(`.bm-btn[data-id="${bm.id}"]`)
  if (btn) btn.classList.add('active')

  document.getElementById('active-name').textContent = `${bm.name} · ${bm.provider}`
  document.getElementById('active-attribution').innerHTML = bm.attribution
}

// ── Build panel ──
const panelBody = document.getElementById('panel-body')

BASEMAPS.forEach(cat => {
  const label = document.createElement('div')
  label.className = 'cat-label'
  label.textContent = cat.category
  panelBody.appendChild(label)

  cat.maps.forEach(bm => {
    const btn = document.createElement('button')
    btn.className = 'bm-btn'
    btn.dataset.id = bm.id
    btn.innerHTML = `
      <div class="bm-thumb"><img src="${bm.thumb}" alt="" onerror="this.parentElement.style.background='#e5e7eb'" /></div>
      <div class="bm-info">
        <div class="bm-name">${bm.name}</div>
        <div class="bm-provider">${bm.provider}</div>
      </div>
      <div class="bm-check"></div>
    `
    btn.addEventListener('click', () => switchBasemap(bm))
    panelBody.appendChild(btn)
  })
})

// ── Minimize ──
const minimizeBtn = document.getElementById('minimize-btn')
const panel = document.getElementById('panel')
minimizeBtn.addEventListener('click', () => {
  const minimized = panel.classList.toggle('minimized')
  minimizeBtn.textContent = minimized ? '+' : '–'
})

// ── Default basemap ──
switchBasemap(BASEMAPS[0].maps[1]) // Positron
</script>
</body>
</html>
