<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earthquake Heatmap</title>
  <link rel="stylesheet" href="../../assets/gallery.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: #e6edf3; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }

    #map { flex: 1; }

    #controls {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 1000;
      background: rgba(13, 17, 23, 0.92);
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 14px 16px;
      min-width: 220px;
      backdrop-filter: blur(8px);
    }

    #controls h3 {
      font-size: 13px;
      font-weight: 600;
      color: #ff6b6b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .control-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 10px;
    }

    .control-row label {
      font-size: 12px;
      color: #8b949e;
      white-space: nowrap;
    }

    select {
      background: #161b22;
      border: 1px solid #30363d;
      color: #e6edf3;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      flex: 1;
    }

    #stats {
      position: absolute;
      bottom: 24px;
      left: 16px;
      z-index: 1000;
      background: rgba(13, 17, 23, 0.92);
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 10px 14px;
      backdrop-filter: blur(8px);
      display: flex;
      gap: 20px;
    }

    .stat { text-align: center; }
    .stat .val { font-size: 20px; font-weight: 700; color: #ff6b6b; }
    .stat .lbl { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.05em; }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 2000;
      background: rgba(13, 17, 23, 0.95);
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px 32px;
      text-align: center;
    }
    #loading p { color: #8b949e; font-size: 13px; margin-top: 8px; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #30363d;
      border-top-color: #ff6b6b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .legend {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
    }
    .legend-bar {
      flex: 1;
      height: 8px;
      border-radius: 4px;
      background: linear-gradient(to right, #0000ff44, #00ff0088, #ffff0088, #ff000088);
    }
    .legend-lbl { font-size: 10px; color: #8b949e; }
  </style>
</head>
<body>

<div id="map"></div>

<div id="controls">
  <h3>🌍 Earthquake Heatmap</h3>
  <div class="control-row">
    <label>Period</label>
    <select id="period">
      <option value="day">Past 24 hours</option>
      <option value="week" selected>Past 7 days</option>
      <option value="month">Past 30 days</option>
    </select>
  </div>
  <div class="control-row">
    <label>Min magnitude</label>
    <select id="magnitude">
      <option value="all">All</option>
      <option value="1.0">≥ 1.0</option>
      <option value="2.5" selected>≥ 2.5</option>
      <option value="4.5">≥ 4.5</option>
      <option value="significant">Significant</option>
    </select>
  </div>
  <div class="control-row">
    <label>View</label>
    <select id="view">
      <option value="heat" selected>Heatmap</option>
      <option value="dots">Dots</option>
    </select>
  </div>
  <div class="legend">
    <span class="legend-lbl">Low</span>
    <div class="legend-bar"></div>
    <span class="legend-lbl">High</span>
  </div>
</div>

<div id="stats">
  <div class="stat"><div class="val" id="count">—</div><div class="lbl">Earthquakes</div></div>
  <div class="stat"><div class="val" id="maxmag">—</div><div class="lbl">Max Mag</div></div>
  <div class="stat"><div class="val" id="strongest">—</div><div class="lbl">Strongest Location</div></div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <p>Fetching earthquake data…</p>
</div>

<a class="back-btn" href="../index.html">← Gallery</a>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
<script>
  const map = L.map('map', {
    center: [20, 0],
    zoom: 2,
    zoomControl: true,
  });

  const basemaps = {
    '🌑 Dark': L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap, © CARTO', maxZoom: 18
    }),
    '🌍 OSM': L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors', maxZoom: 19
    }),
    '☀️ Light': L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap, © CARTO', maxZoom: 18
    }),
    '🛰️ Satellite': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: '© Esri', maxZoom: 18
    }),
    '🗺️ Toner': L.tileLayer('https://tiles.stadiamaps.com/tiles/stamen_toner/{z}/{x}/{y}{r}.png', {
      attribution: '© Stadia Maps, © Stamen Design, © OpenStreetMap', maxZoom: 20
    }),
  };

  basemaps['🌑 Dark'].addTo(map);
  L.control.layers(basemaps, {}, { position: 'topleft', collapsed: false }).addTo(map);

  let heatLayer = null;
  let dotLayer = null;
  let currentData = [];

  function getMagColor(mag) {
    if (mag >= 7) return '#ff0000';
    if (mag >= 6) return '#ff4500';
    if (mag >= 5) return '#ff8c00';
    if (mag >= 4) return '#ffd700';
    if (mag >= 3) return '#adff2f';
    return '#00bfff';
  }

  function getMagRadius(mag) {
    return Math.max(3, (mag - 1) * 3);
  }

  function renderHeat(data) {
    if (heatLayer) map.removeLayer(heatLayer);
    if (dotLayer) map.removeLayer(dotLayer);

    const view = document.getElementById('view').value;

    if (view === 'heat') {
      const points = data.map(f => {
        const [lng, lat] = f.geometry.coordinates;
        const mag = f.properties.mag || 1;
        return [lat, lng, Math.max(0.1, mag / 10)];
      });
      heatLayer = L.heatLayer(points, {
        radius: 18,
        blur: 20,
        maxZoom: 8,
        gradient: { 0.2: '#0000ff', 0.4: '#00ff00', 0.6: '#ffff00', 0.8: '#ff8800', 1.0: '#ff0000' }
      }).addTo(map);
    } else {
      dotLayer = L.layerGroup();
      data.forEach(f => {
        const [lng, lat] = f.geometry.coordinates;
        const mag = f.properties.mag || 1;
        const place = f.properties.place || 'Unknown';
        const time = new Date(f.properties.time).toUTCString();
        L.circleMarker([lat, lng], {
          radius: getMagRadius(mag),
          fillColor: getMagColor(mag),
          color: '#000',
          weight: 0.5,
          opacity: 0.8,
          fillOpacity: 0.7,
        }).bindPopup(`<b>M${mag.toFixed(1)}</b><br>${place}<br><small>${time}</small>`).addTo(dotLayer);
      });
      dotLayer.addTo(map);
    }

    // Update stats
    document.getElementById('count').textContent = data.length.toLocaleString();
    if (data.length > 0) {
      const strongest = data.reduce((a, b) => (b.properties.mag > a.properties.mag ? b : a));
      document.getElementById('maxmag').textContent = strongest.properties.mag?.toFixed(1) ?? '—';
      const place = strongest.properties.place || '';
      document.getElementById('strongest').textContent = place.length > 20 ? place.slice(0, 18) + '…' : place;
    }
  }

  async function fetchData() {
    const period = document.getElementById('period').value;
    const mag = document.getElementById('magnitude').value;
    const url = `https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/${mag}_${period}.geojson`;

    document.getElementById('loading').style.display = 'block';
    try {
      const res = await fetch(url);
      const json = await res.json();
      currentData = json.features || [];
      renderHeat(currentData);
    } catch (e) {
      console.error(e);
    } finally {
      document.getElementById('loading').style.display = 'none';
    }
  }

  document.getElementById('period').addEventListener('change', fetchData);
  document.getElementById('magnitude').addEventListener('change', fetchData);
  document.getElementById('view').addEventListener('change', () => renderHeat(currentData));

  fetchData();
</script>
</body>
</html>
