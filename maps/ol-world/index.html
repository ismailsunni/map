<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Overview — OpenLayers</title>
  <!-- OpenLayers -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ol@10.3.0/ol.css" />
  <script src="https://cdn.jsdelivr.net/npm/ol@10.3.0/dist/ol.js"></script>
  <!-- Shared styles -->
  <link rel="stylesheet" href="../../assets/gallery.css" />
  <style>
    html, body { height: 100%; margin: 0; }
    #map { width: 100%; height: 100vh; }
    .map-info {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      background: rgba(15,17,23,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid #2a2d3a;
      color: #e8eaf0;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.8rem;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    .map-info h3 { margin-bottom: 0.25rem; font-size: 0.9rem; }
    .map-info p { color: #8b8fa8; }
  </style>
</head>
<body>
  <a class="back-btn" href="../../index.html">← Gallery</a>
  <div id="map"></div>
  <div class="map-info">
    <h3>🌍 World Overview</h3>
    <p>Library: OpenLayers · Tiles: OSM</p>
  </div>

  <script>
    const map = new ol.Map({
      target: 'map',
      layers: [
        new ol.layer.Tile({
          source: new ol.source.OSM()
        })
      ],
      view: new ol.View({
        center: ol.proj.fromLonLat([0, 20]),
        zoom: 2
      })
    });
  </script>
</body>
</html>
