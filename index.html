<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map Collection</title>
  <meta name="description" content="A personal gallery of interactive maps built with OpenLayers, MapLibre GL, and CesiumJS." />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>" />
  <link rel="stylesheet" href="assets/gallery.css" />
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode">🌙</button>

  <header>
    <h1>🗺️ Map Collection</h1>
    <p>Interactive maps built with OpenLayers, MapLibre, and CesiumJS.</p>
  </header>

  <div class="gallery-wrap">
    <div class="gallery" id="gallery">
      <p class="gallery-message">Loading maps…</p>
    </div>
  </div>

  <footer>
    <span>Built with</span>
    <a href="https://openlayers.org/" target="_blank" rel="noopener">OpenLayers</a>
    <span>·</span>
    <a href="https://maplibre.org/" target="_blank" rel="noopener">MapLibre</a>
    <span>·</span>
    <a href="https://cesium.com/" target="_blank" rel="noopener">CesiumJS</a>
    <span>·</span>
    <a href="https://github.com/ismailsunni/map" target="_blank" rel="noopener">Source</a>
  </footer>

  <script>
    // ── Theme toggle ──
    const toggle = document.getElementById('theme-toggle');
    const html = document.documentElement;

    function setTheme(dark) {
      html.setAttribute('data-theme', dark ? 'dark' : 'light');
      toggle.textContent = dark ? '☀️' : '🌙';
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    }

    // Init from localStorage or system preference
    const saved = localStorage.getItem('theme');
    if (saved) {
      setTheme(saved === 'dark');
    } else {
      setTheme(window.matchMedia('(prefers-color-scheme: dark)').matches);
    }

    toggle.addEventListener('click', () => {
      setTheme(html.getAttribute('data-theme') !== 'dark');
    });

    // ── Gallery ──
    const ICONS = {
      'OpenLayers': '🌍',
      'MapLibre':   '🗺️',
      'Cesium':     '🌐',
    };

    async function loadGallery() {
      const gallery = document.getElementById('gallery');
      try {
        const res = await fetch('maps.json');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const maps = await res.json();

        if (!maps.length) {
          gallery.innerHTML = '<p class="gallery-message">No maps yet.</p>';
          return;
        }

        gallery.innerHTML = maps.map(m => {
          const icon = ICONS[m.library] || '📍';
          const tags = (m.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
          return `
            <a class="card" href="${m.id}/">
              <div class="card-thumb">
                <img
                  src="${m.id}/thumb.png"
                  alt="${m.title} thumbnail"
                  onerror="this.style.display='none'"
                />
                <span class="placeholder-icon" aria-hidden="true">${icon}</span>
              </div>
              <div class="card-body">
                <div class="card-title">${m.title}</div>
                <div class="card-desc">${m.description}</div>
                <div class="card-footer">
                  <span class="badge-lib" style="background:${m.libraryColor}">${m.library}</span>
                  ${tags}
                </div>
              </div>
            </a>`;
        }).join('');
      } catch (e) {
        gallery.innerHTML = `<p class="gallery-message error">⚠ Could not load maps: ${e.message}</p>`;
      }
    }

    loadGallery();
  </script>
</body>
</html>
